name:                tabsend-server
version:             0.1.0.0
license:             AGPL-3
author:              "morj"
maintainer:          "contact@morj.com"
synopsis:            Does stuff

executables:
  app-exe:
    main:                Main.hs
    source-dirs:         src
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -Wall -Wcompat
    dependencies:
    - base
    - aeson
    - bytestring
    - containers
    - http-types
    - text
    - servant
    - servant-server
    - wai
    - warp

default-extensions:
- BangPatterns
- DisambiguateRecordFields
- DuplicateRecordFields
- LambdaCase
- MultiWayIf
- NamedFieldPuns
- NumericUnderscores
- OverloadedLabels
- OverloadedStrings
- ScopedTypeVariables
- TypeApplications
- TypeOperators

- NoFieldSelectors
- OverloadedRecordDot
